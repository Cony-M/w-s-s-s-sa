<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毕业纪念册</title>
  <script src="https://cdn.jsdelivr.net/npm/fabric@5.3.1/dist/fabric.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at top, #243b55, #050505 70%);
      font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
    }

    /* 认证模态框 */
    .auth-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(5px);
    }

    .auth-modal.show {
      display: flex;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .auth-card h2 {
      margin-top: 0;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .auth-card input {
      width: 100%;
      padding: 12px 16px;
      margin: 10px 0;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 16px;
    }

    .auth-card input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .auth-card button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .auth-card button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .mode-badge {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      font-size: 12px;
      margin-top: 10px;
    }

    /* 顶部玻璃栏 */
    .toolbar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: min(95%, 900px);
      height: auto;
      padding: 12px 15px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      flex-wrap: wrap;
    }

    .tool {
      width: 45px;
      height: 45px;
      border-radius: 15px;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.25s;
      flex-shrink: 0;
    }

    .tool:hover {
      transform: translateY(-5px) scale(1.08);
      background: rgba(255, 255, 255, 0.35);
    }

    .tool:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .tool-label {
      font-size: 12px;
      margin-top: 2px;
    }

    input[type="color"] {
      width: 45px;
      height: 45px;
      border-radius: 15px;
      border: none;
      padding: 0;
      cursor: pointer;
    }

    input[type="range"] {
      width: 80px;
      cursor: pointer;
    }

    .main {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 80px;
    }

    .card {
      padding: 20px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      border-radius: 20px;
      max-width: 100%;
      max-height: 100%;
    }

    .upload {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 25px;
      border-radius: 50px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s;
    }

    .upload:hover {
      transform: translateX(-50%) translateY(-3px);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
    }

    .upload.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }

    input[type="file"] {
      display: none;
    }

    .title {
      position: fixed;
      top: 110px;
      width: 100%;
      text-align: center;
      font-size: clamp(18px, 5vw, 25px);
      letter-spacing: 3px;
      opacity: 0.8;
      z-index: 5;
    }

    .user-info {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.1);
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      z-index: 10;
    }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 50;
    }

    .toast.show {
      opacity: 1;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .toolbar {
        width: 90%;
        gap: 8px;
        padding: 10px 8px;
      }

      .tool {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }

      input[type="range"] {
        width: 60px;
      }

      .title {
        top: 80px;
        font-size: clamp(16px, 4vw, 20px);
        letter-spacing: 2px;
      }

      .main {
        padding: 80px 10px 70px;
      }

      .card {
        padding: 10px;
      }

      .upload {
        bottom: 20px;
        padding: 12px 20px;
        font-size: 14px;
      }

      .user-info {
        top: 10px;
        right: 10px;
        font-size: 11px;
      }

      .auth-card {
        padding: 30px 20px;
      }
    }

    @media (max-width: 480px) {
      .toolbar {
        top: 10px;
        width: 95%;
      }

      .tool {
        width: 38px;
        height: 38px;
      }

      input[type="color"] {
        width: 38px;
        height: 38px;
      }

      .title {
        top: 70px;
        font-size: 16px;
        letter-spacing: 1px;
      }

      .main {
        padding: 70px 8px 60px;
      }

      .upload {
        font-size: 12px;
        padding: 10px 16px;
      }
    }
  </style>
</head>

<body>
  <!-- 认证模态框 -->
  <div class="auth-modal" id="authModal">
    <div class="auth-card">
      <h2>管理员登录</h2>
      <input 
        type="password" 
        id="authPassword" 
        placeholder="输入管理密码"
      >
      <button onclick="authenticate()">登录</button>
      <div class="mode-badge">仅管理员可编辑内容</div>
    </div>
  </div>

  <div class="title">
    我们的青春 · 毕业纪念
  </div>

  <div class="user-info" id="userInfo">
    👁 查看模式
  </div>

  <div class="toolbar">
    <button class="tool" id="penBtn" onclick="pen()" title="画笔">
      <i data-lucide="pen-tool"></i>
    </button>

    <button class="tool" id="eraserBtn" onclick="eraser()" title="橡皮">
      <i data-lucide="eraser"></i>
    </button>

    <input 
      type="color"
      id="color"
      value="#ff3366"
      title="选择颜色"
    >

    <input
      type="range"
      id="size"
      min="1"
      max="40"
      value="5"
      title="笔刷大小"
    >

    <button class="tool" id="undoBtn" onclick="undo()" title="撤销">
      <i data-lucide="undo"></i>
    </button>

    <button class="tool" id="clearBtn" onclick="clearDraw()" title="清除涂鸦">
      <i data-lucide="trash-2"></i>
    </button>

    <button class="tool" id="saveBtn" onclick="saveImage()" title="截屏下载">
      <i data-lucide="download"></i>
    </button>

    <button class="tool" id="logoutBtn" onclick="logout()" title="退出登录" style="display: none;">
      <i data-lucide="log-out"></i>
    </button>
  </div>

  <div class="main">
    <div class="card">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <label class="upload" id="uploadLabel">
    <i data-lucide="image-plus"></i>
    <span id="uploadText">预览毕业照</span>
    <input 
      id="file"
      type="file"
      accept="image/*"
    >
  </label>

  <div class="toast" id="toast"></div>

  <script>
    lucide.createIcons();

    // ===== 配置 =====
    const CONFIG = {
      adminPassword: "admin123", // 修改为你的密码
      defaultImage: "https://picsum.photos/1200/800"
    };

    // ===== 状态管理 =====
    let isAdmin = false;
    let isDrawing = false;
    let canvas = null;
    let photo = null;
    let history = [];

    // ===== 初始化 Canvas =====
    function initCanvas() {
      canvas = new fabric.Canvas("canvas", {
        isDrawingMode: false,
        selection: false,
        preserveObjectStacking: true
      });

      resizeCanvas();
      loadDefaultImage();
      attachCanvasEvents();
    }

    function resizeCanvas() {
      const container = document.querySelector(".card");
      const maxWidth = Math.min(window.innerWidth * 0.9, 1200);
      const maxHeight = Math.min(window.innerHeight * 0.7, 800);
      
      canvas.setWidth(maxWidth);
      canvas.setHeight(maxHeight);
      canvas.renderAll();
    }

    function loadDefaultImage() {
      fabric.Image.fromURL(CONFIG.defaultImage, (img) => {
        loadImage(img);
      }, {
        crossOrigin: "anonymous"
      });
    }

    function loadImage(img) {
      canvas.clear();
      history = [];
      photo = img;

      let scale = Math.min(
        canvas.width / img.width,
        canvas.height / img.height
      ) * 0.9;

      img.scale(scale);
      img.set({
        left: (canvas.width - img.width * scale) / 2,
        top: (canvas.height - img.height * scale) / 2,
        selectable: false,
        evented: false
      });

      canvas.add(img);
      canvas.sendToBack(img);
    }

    // ===== 认证系统 =====
    function authenticate() {
      const password = document.getElementById("authPassword").value;
      
      if (password === CONFIG.adminPassword) {
        isAdmin = true;
        document.getElementById("authModal").classList.remove("show");
        document.getElementById("userInfo").textContent = "👤 管理员模式";
        document.getElementById("logoutBtn").style.display = "flex";
        document.getElementById("uploadLabel").classList.remove("disabled");
        enableEditTools(true);
        showToast("已进入管理员模式");
      } else {
        showToast("密码错误");
        document.getElementById("authPassword").value = "";
      }
    }

    function logout() {
      isAdmin = false;
      document.getElementById("userInfo").textContent = "👁 查看模式";
      document.getElementById("logoutBtn").style.display = "none";
      document.getElementById("uploadLabel").classList.add("disabled");
      enableEditTools(false);
      clearDraw();
      showToast("已退出登录，涂鸦已清除");
      document.getElementById("authPassword").value = "";
    }

    function enableEditTools(enable) {
      const tools = ["penBtn", "eraserBtn", "clearBtn"];
      tools.forEach(id => {
        const btn = document.getElementById(id);
        if (enable) {
          btn.style.opacity = "1";
          btn.style.pointerEvents = "auto";
        } else {
          btn.style.opacity = "0.5";
          btn.style.pointerEvents = "none";
        }
      });

      document.getElementById("file").disabled = !enable;
      document.getElementById("uploadLabel").classList.toggle("disabled", !enable);
    }

    // ===== Canvas 事件 =====
    function attachCanvasEvents() {
      // 缩放
      canvas.on("mouse:wheel", (e) => {
        let zoom = canvas.getZoom() - e.e.deltaY / 1200;
        zoom = Math.max(0.4, Math.min(5, zoom));
        canvas.zoomToPoint(
          { x: e.e.offsetX, y: e.e.offsetY },
          zoom
        );
        e.e.preventDefault();
      });

      // 拖动
      let move = false, last;
      canvas.on("mouse:down", (e) => {
        if (!canvas.isDrawingMode) {
          move = true;
          last = e.e;
        }
      });

      canvas.on("mouse:move", (e) => {
        if (move) {
          canvas.relativePan(
            new fabric.Point(
              e.e.clientX - last.clientX,
              e.e.clientY - last.clientY
            )
          );
          last = e.e;
        }
      });

      canvas.on("mouse:up", () => move = false);

      // 记录绘图历史
      canvas.on("path:created", () => {
        if (isAdmin) {
          history.push(canvas.toJSON());
        }
      });
    }

    // ===== 绘图工具 =====
    function pen() {
      if (!isAdmin) {
        showToast("仅管理员可编辑");
        return;
      }
      canvas.isDrawingMode = true;
      let brush = new fabric.PencilBrush(canvas);
      brush.color = document.getElementById("color").value;
      brush.width = +document.getElementById("size").value;
      canvas.freeDrawingBrush = brush;
      showToast("画笔已启用");
    }

    function eraser() {
      if (!isAdmin) {
        showToast("仅管理员可编辑");
        return;
      }
      canvas.isDrawingMode = true;
      let brush = new fabric.EraserBrush(canvas);
      brush.width = +document.getElementById("size").value;
      canvas.freeDrawingBrush = brush;
      showToast("橡皮已启用");
    }

    function undo() {
      if (!isAdmin) return;
      let old = history.pop();
      if (old) {
        canvas.loadFromJSON(old, () => {
          canvas.renderAll();
        });
      }
    }

    function clearDraw() {
      if (!isAdmin && canvas.isDrawingMode) {
        showToast("仅管理员可清除");
        return;
      }
      canvas.getObjects()
        .filter(o => o !== photo)
        .forEach(o => canvas.remove(o));
      canvas.isDrawingMode = false;
      history = [];
      canvas.renderAll();
    }

    // ===== 图片上传和下载 =====
    document.getElementById("file").addEventListener("change", (e) => {
      if (!isAdmin) return;
      
      let reader = new FileReader();
      reader.onload = (x) => {
        fabric.Image.fromURL(x.target.result, (img) => {
          loadImage(img);
          showToast("图片已上传");
        }, {
          crossOrigin: "anonymous"
        });
      };
      reader.readAsDataURL(e.target.files[0]);
    });

    function saveImage() {
      let link = document.createElement("a");
      link.href = canvas.toDataURL({
        format: "png",
        quality: 1
      });
      link.download = `毕业纪念-${new Date().getTime()}.png`;
      link.click();
      showToast("截屏已保存");
    }

    // ===== 工具函数 =====
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => {
        toast.classList.remove("show");
      }, 2000);
    }

    // ===== 响应式处理 =====
    window.addEventListener("resize", () => {
      resizeCanvas();
    });

    // ===== 退出时清除绘图 =====
    window.addEventListener("beforeunload", () => {
      clearDraw();
    });

    // ===== 启动 =====
    window.addEventListener("DOMContentLoaded", () => {
      initCanvas();
      // 检查是否需要显示登录框
      const shouldShowAuth = confirm("是否为管理员？点击确定登录。");
      if (shouldShowAuth) {
        document.getElementById("authModal").classList.add("show");
      } else {
        enableEditTools(false);
        document.getElementById("uploadLabel").classList.add("disabled");
      }
    });
  </script>
</body>
</html>
