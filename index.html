<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">


<title>毕业纪念册</title>


<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.1/dist/fabric.min.js"></script>

<!-- 图标 -->
<script src="https://unpkg.com/lucide@latest"></script>


<style>


*{
box-sizing:border-box;
}


body{

margin:0;
height:100vh;
overflow:hidden;

background:
radial-gradient(circle at top,#243b55,#050505 70%);

font-family:
"Microsoft YaHei";

color:white;

}


/* 顶部玻璃栏 */

.toolbar{


position:fixed;

top:20px;
left:50%;

transform:translateX(-50%);


width:min(95%,900px);


height:70px;


border-radius:25px;


background:
rgba(255,255,255,.12);


backdrop-filter:
blur(20px);


display:flex;

align-items:center;

justify-content:center;

gap:15px;


z-index:10;


border:
1px solid rgba(255,255,255,.2);


box-shadow:
0 20px 50px #0008;


}




.tool{


width:45px;
height:45px;


border-radius:15px;


border:none;


background:
rgba(255,255,255,.15);


color:white;


display:flex;

align-items:center;

justify-content:center;


cursor:pointer;


transition:.25s;


}



.tool:hover{


transform:
translateY(-5px)
scale(1.08);


background:
rgba(255,255,255,.35);


}



input[type=color]{


width:45px;
height:45px;

border-radius:15px;

border:none;

padding:0;

}





.main{


position:absolute;

top:0;
bottom:0;

left:0;
right:0;


display:flex;

align-items:center;

justify-content:center;

}



.card{


padding:25px;


border-radius:30px;


background:
rgba(255,255,255,.08);


backdrop-filter:
blur(20px);


box-shadow:
0 30px 80px #0009;


}



canvas{


border-radius:20px;


}




.upload{


position:fixed;


bottom:30px;

left:50%;

transform:translateX(-50%);


padding:14px 25px;


border-radius:50px;


background:
linear-gradient(135deg,#667eea,#764ba2);


cursor:pointer;


box-shadow:
0 10px 30px #0007;


}



input[type=file]{

display:none;

}



.title{


position:fixed;

top:110px;

width:100%;

text-align:center;


font-size:25px;

letter-spacing:5px;


opacity:.8;

}


</style>

</head>



<body>



<div class="title">

我们的青春 · 毕业纪念

</div>



<div class="toolbar">


<button class="tool" onclick="pen()">
<i data-lucide="pen-tool"></i>
</button>


<button class="tool" onclick="eraser()">
<i data-lucide="eraser"></i>
</button>



<input 
type="color"
id="color"
value="#ff3366">



<input
type="range"
id="size"
min="1"
max="40"
value="5">



<button class="tool" onclick="undo()">
<i data-lucide="undo"></i>
</button>


<button class="tool" onclick="clearDraw()">
<i data-lucide="trash-2"></i>
</button>


<button class="tool" onclick="save()">
<i data-lucide="download"></i>
</button>



</div>





<div class="main">


<div class="card">

<canvas id="canvas"></canvas>

</div>


</div>




<label class="upload">

<i data-lucide="image-plus"></i>

上传毕业照

<input 
id="file"
type="file"
accept="image/*">

</label>






<script>


lucide.createIcons();



const canvas =
new fabric.Canvas("canvas",{

isDrawingMode:false,

selection:false,

preserveObjectStacking:true

});



canvas.setWidth(
window.innerWidth*0.85
);


canvas.setHeight(
window.innerHeight*0.7
);



let photo;



/*
默认图片
*/

fabric.Image.fromURL(

"https://picsum.photos/1200/800",

img=>{

loadImage(img);

}

);





function loadImage(img){


canvas.clear();


photo=img;


let scale=
Math.min(
canvas.width/img.width,
canvas.height/img.height
)*0.9;



img.scale(scale);



img.set({

left:(canvas.width-img.width*scale)/2,

top:(canvas.height-img.height*scale)/2,


selectable:false,

evented:false

});



canvas.add(img);

canvas.sendToBack(img);


}






/*
上传图片
*/


file.onchange=e=>{


let reader=new FileReader();


reader.onload=x=>{


fabric.Image.fromURL(
x.target.result,
img=>loadImage(img)
);


};


reader.readAsDataURL(
e.target.files[0]
);


};





/*
缩放
*/


canvas.on(
"mouse:wheel",
e=>{


let zoom=
canvas.getZoom()
-
e.e.deltaY/1200;


zoom=Math.max(
0.4,
Math.min(5,zoom)
);


canvas.zoomToPoint(
{
x:e.e.offsetX,
y:e.e.offsetY
},
zoom
);


e.e.preventDefault();


});





/*
拖动
*/


let move=false,last;


canvas.on("mouse:down",e=>{

if(!canvas.isDrawingMode){

move=true;

last=e.e;

}

});



canvas.on("mouse:move",e=>{


if(move){

canvas.relativePan(
new fabric.Point(
e.e.clientX-last.clientX,
e.e.clientY-last.clientY
)
);


last=e.e;

}


});



canvas.on("mouse:up",()=>move=false);






/*
画笔
*/


function pen(){


canvas.isDrawingMode=true;


let b=
new fabric.PencilBrush(canvas);


b.color=
color.value;


b.width=
+size.value;



canvas.freeDrawingBrush=b;


}





function eraser(){


canvas.isDrawingMode=true;


let b=
new fabric.EraserBrush(canvas);


b.width=
+size.value;


canvas.freeDrawingBrush=b;


}





let history=[];



canvas.on(
"path:created",
()=>{

history.push(
canvas.toJSON()
);

});





function undo(){


let old=
history.pop();


if(old)

canvas.loadFromJSON(
old
);


}





function clearDraw(){


canvas.getObjects()
.filter(
o=>o!==photo
)
.forEach(
o=>canvas.remove(o)
);


}





function save(){


let a=document.createElement("a");


a.href=
canvas.toDataURL({
format:"png",
quality:1
});


a.download=
"毕业纪念.png";


a.click();

}



</script>


</body>
</html>
