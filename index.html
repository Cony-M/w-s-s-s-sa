<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毕业纪念册 - Memory Book</title>
  <script src="https://cdn.jsdelivr.net/npm/fabric@5.3.1/dist/fabric.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      color: white;
      position: relative;
    }

    /* ===== 宇宙背景 ===== */
    .universe-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 20% 50%, rgba(20, 30, 80, 0.8) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(10, 50, 100, 0.6) 0%, transparent 50%),
                  linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f3460 100%);
      z-index: 1;
    }

    /* 星空 */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* 流星雨 */
    .meteors {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .meteor {
      position: absolute;
      width: 2px;
      height: 100px;
      background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(255,200,100,0.3) 50%, transparent 100%);
      filter: drop-shadow(0 0 8px rgba(255, 200, 100, 0.6));
      animation: meteorFall 2s linear infinite;
    }

    @keyframes meteorFall {
      0% {
        transform: translateY(-100px) translateX(0);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) translateX(200px);
        opacity: 0;
      }
    }

    .meteor:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 2.5s; }
    .meteor:nth-child(2) { left: 30%; animation-delay: 0.5s; animation-duration: 2.8s; }
    .meteor:nth-child(3) { left: 50%; animation-delay: 1s; animation-duration: 2.3s; }
    .meteor:nth-child(4) { left: 70%; animation-delay: 1.5s; animation-duration: 2.6s; }
    .meteor:nth-child(5) { left: 90%; animation-delay: 2s; animation-duration: 2.4s; }

    /* 内容容器 */
    .content {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 20px;
    }

    /* ===== 首页入口选择 ===== */
    .entry-selection {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      animation: fadeIn 0.3s ease-out;
    }

    .entry-selection.hidden {
      display: none;
    }

    .selection-card {
      text-align: center;
      animation: slideUp 0.5s ease-out;
    }

    .selection-card h1 {
      font-size: 48px;
      margin-bottom: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #00D4FF, #7928CA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .selection-card p {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 40px;
    }

    .selection-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .selection-btn {
      padding: 16px 40px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .selection-btn-admin {
      background: linear-gradient(135deg, #00D4FF, #7928CA);
      color: white;
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
    }

    .selection-btn-admin:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
    }

    .selection-btn-view {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
    }

    .selection-btn-view:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-3px);
    }

    /* ===== 认证模态框 ===== */
    .auth-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(8px);
    }

    .auth-modal.show {
      display: flex;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(30px);
      padding: 50px 40px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5),
                  inset 0 1px 0 rgba(255, 255, 255, 0.2);
      text-align: center;
      max-width: 400px;
      width: 90%;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .auth-card h2 {
      font-size: 28px;
      margin-bottom: 30px;
      font-weight: 600;
      background: linear-gradient(135deg, #00D4FF, #7928CA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-card p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .auth-card input {
      width: 100%;
      padding: 14px 16px;
      margin: 12px 0;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 15px;
      transition: 0.3s;
    }

    .auth-card input:focus {
      outline: none;
      border-color: rgba(0, 212, 255, 0.5);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .auth-card input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .auth-buttons {
      display: flex;
      gap: 12px;
      margin-top: 25px;
    }

    .auth-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .auth-btn-primary {
      background: linear-gradient(135deg, #00D4FF, #7928CA);
      color: white;
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
    }

    .auth-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
    }

    .auth-btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .auth-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* ===== 顶部标题 ===== */
    .title-section {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 20;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        transform: translateX(-50%) translateY(-30px);
        opacity: 0;
      }
      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }

    .title-section h1 {
      font-size: clamp(24px, 5vw, 32px);
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00D4FF, #7928CA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title-section p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 2px;
    }

    /* ===== 用户信息 ===== */
    .user-info {
      position: fixed;
      top: 40px;
      right: 40px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      padding: 12px 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideDown 0.6s ease-out 0.1s both;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #00D4FF;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ===== 工具栏 ===== */
    .toolbar {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(30px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      z-index: 20;
      flex-wrap: wrap;
      justify-content: center;
      animation: slideUp 0.6s ease-out 0.2s both;
      max-width: 90%;
    }

    .tool {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s;
      flex-shrink: 0;
      position: relative;
    }

    .tool:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
    }

    .tool:active:not(:disabled) {
      transform: translateY(-2px);
    }

    .tool:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .tool.active {
      background: linear-gradient(135deg, #00D4FF, #7928CA);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
    }

    input[type="color"] {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: none;
      padding: 4px;
      cursor: pointer;
      background: none;
    }

    input[type="range"] {
      width: 100px;
      height: 48px;
      cursor: pointer;
      appearance: none;
      background: transparent;
      border: none;
      padding: 12px 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00D4FF, #7928CA);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00D4FF, #7928CA);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    /* ===== 主画布区域 ===== */
    .main-container {
      position: fixed;
      top: 120px;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      width: min(95%, 900px);
      height: calc(100% - 240px);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(30px);
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: slideUp 0.6s ease-out 0.15s both;
    }

    .canvas-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    canvas {
      border-radius: 20px;
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    /* ===== 上传按钮 ===== */
    .upload-area {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 40px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(30px);
      border: 2px dashed rgba(0, 212, 255, 0.3);
      border-radius: 20px;
      text-align: center;
      z-index: 15;
      pointer-events: none;
      opacity: 0;
      transition: 0.3s;
      display: none;
    }

    .upload-area.show {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      opacity: 1;
    }

    .upload-label {
      position: fixed;
      bottom: 40px;
      right: 40px;
      padding: 14px 28px;
      border-radius: 50px;
      background: linear-gradient(135deg, #00D4FF, #7928CA);
      cursor: pointer;
      box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.3s;
      font-weight: 600;
      font-size: 14px;
      z-index: 20;
      animation: slideUp 0.6s ease-out 0.3s both;
    }

    .upload-label:hover:not(.disabled) {
      transform: translateY(-3px);
      box-shadow: 0 15px 50px rgba(0, 212, 255, 0.4);
    }

    .upload-label.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }

    input[type="file"] {
      display: none;
    }

    /* ===== 提示信息 ===== */
    .toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 50;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .toast.show {
      opacity: 1;
    }

    .toast.error {
      border-color: rgba(255, 100, 100, 0.3);
      background: rgba(255, 100, 100, 0.1);
    }

    .toast.success {
      border-color: rgba(100, 255, 150, 0.3);
      background: rgba(100, 255, 150, 0.1);
    }

    /* ===== 响应式设计 ===== */
    @media (max-width: 768px) {
      .toolbar {
        gap: 8px;
        padding: 12px 12px;
        bottom: 20px;
      }

      .tool {
        width: 44px;
        height: 44px;
        font-size: 18px;
      }

      input[type="range"] {
        width: 60px;
      }

      .title-section {
        top: 20px;
      }

      .title-section h1 {
        font-size: 22px;
      }

      .user-info {
        top: 20px;
        right: 20px;
        font-size: 12px;
        padding: 10px 16px;
      }

      .main-container {
        top: 100px;
        bottom: 100px;
        height: calc(100% - 200px);
      }

      .upload-label {
        bottom: 20px;
        right: 20px;
        padding: 12px 20px;
        font-size: 12px;
      }

      .auth-card {
        padding: 40px 25px;
      }

      .auth-card h2 {
        font-size: 24px;
      }

      .selection-card h1 {
        font-size: 36px;
      }

      .selection-btn {
        padding: 14px 30px;
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      .toolbar {
        width: 95%;
        gap: 6px;
        padding: 10px 8px;
      }

      .tool {
        width: 40px;
        height: 40px;
        font-size: 16px;
      }

      input[type="color"] {
        width: 40px;
        height: 40px;
      }

      input[type="range"] {
        width: 50px;
      }

      .title-section h1 {
        font-size: 18px;
      }

      .user-info {
        font-size: 11px;
        padding: 8px 12px;
      }

      .main-container {
        top: 80px;
        bottom: 80px;
        height: calc(100% - 160px);
        width: 98%;
        padding: 12px;
      }

      .upload-label {
        padding: 10px 16px;
        font-size: 11px;
      }

      .selection-card h1 {
        font-size: 28px;
      }

      .selection-buttons {
        gap: 12px;
      }

      .selection-btn {
        padding: 12px 24px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <!-- 宇宙背景 -->
  <div class="universe-background"></div>

  <!-- 星空 -->
  <div class="stars" id="starsContainer"></div>

  <!-- 流星雨 -->
  <div class="meteors">
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
    <div class="meteor"></div>
  </div>

  <!-- 首页入口选择 -->
  <div class="entry-selection" id="entrySelection">
    <div class="selection-card">
      <h1>✨ 欢迎来到</h1>
      <h1>我们的青春 · 毕业纪念</h1>
      <p>GRADUATION MEMORIAL · MEMORY BOOK</p>
      <div class="selection-buttons">
        <button class="selection-btn selection-btn-admin" onclick="startAdmin()">
          🔐 管理员登录
        </button>
        <button class="selection-btn selection-btn-view" onclick="startView()">
          👀 浏览模式
        </button>
      </div>
    </div>
  </div>

  <!-- 认证模态框 -->
  <div class="auth-modal" id="authModal">
    <div class="auth-card">
      <h2>✨ 管理员登录</h2>
      <p>输入密码以获得编辑权限</p>
      <input 
        type="password" 
        id="authPassword" 
        placeholder="输入管理密码"
        onkeypress="event.key === 'Enter' && authenticate()"
      >
      <div class="auth-buttons">
        <button class="auth-btn auth-btn-secondary" onclick="backToSelection()">返回</button>
        <button class="auth-btn auth-btn-primary" onclick="authenticate()">登录</button>
      </div>
    </div>
  </div>

  <!-- 内容区域 -->
  <div class="content" id="mainContent" style="display: none;">
    <!-- 标题 -->
    <div class="title-section">
      <h1>我们的青春 · 毕业纪念</h1>
      <p>GRADUATION MEMORIAL · MEMORY BOOK</p>
    </div>

    <!-- 用户信息 -->
    <div class="user-info" id="userInfo">
      <div class="status-dot"></div>
      <span id="userStatus">查看模式</span>
    </div>

    <!-- 主画布容器 -->
    <div class="main-container">
      <div class="canvas-wrapper">
        <canvas id="canvas"></canvas>
      </div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
      <button class="tool" id="penBtn" onclick="pen()" title="画笔">
        <i data-lucide="pen-tool" stroke-width="1.5"></i>
      </button>

      <button class="tool" id="eraserBtn" onclick="eraser()" title="橡皮">
        <i data-lucide="eraser" stroke-width="1.5"></i>
      </button>

      <input 
        type="color"
        id="color"
        value="#00D4FF"
        title="选择颜色"
      >

      <input
        type="range"
        id="size"
        min="1"
        max="50"
        value="8"
        title="笔刷大���"
      >

      <button class="tool" id="undoBtn" onclick="undo()" title="撤销">
        <i data-lucide="undo-2" stroke-width="1.5"></i>
      </button>

      <button class="tool" id="clearBtn" onclick="clearDraw()" title="清除涂鸦">
        <i data-lucide="trash-2" stroke-width="1.5"></i>
      </button>

      <button class="tool" id="saveBtn" onclick="saveImage()" title="下载截图">
        <i data-lucide="download" stroke-width="1.5"></i>
      </button>

      <button class="tool" id="logoutBtn" onclick="logout()" title="退出登录" style="display: none;">
        <i data-lucide="log-out" stroke-width="1.5"></i>
      </button>
    </div>

    <!-- 上传按钮 -->
    <label class="upload-label" id="uploadLabel">
      <i data-lucide="image-plus" stroke-width="1.5"></i>
      <span>上传照片</span>
      <input 
        id="file"
        type="file"
        accept="image/*"
      >
    </label>
  </div>

  <!-- 提示信息 -->
  <div class="toast" id="toast"></div>

  <script>
    lucide.createIcons();

    // ===== 配置 =====
    const CONFIG = {
      adminPassword: "111",
      defaultImage: "https://images.unsplash.com/photo-1511379938547-c1f69b13d835?w=1200&h=800&fit=crop"
    };

    // ===== 状态管理 =====
    let isAdmin = false;
    let currentTool = null;
    let canvas = null;
    let photo = null;
    let history = [];

    // ===== 入口选择 =====
    function startAdmin() {
      document.getElementById("entrySelection").classList.add("hidden");
      document.getElementById("mainContent").style.display = "flex";
      document.getElementById("authModal").classList.add("show");
      initCanvas();
    }

    function startView() {
      document.getElementById("entrySelection").classList.add("hidden");
      document.getElementById("mainContent").style.display = "flex";
      document.getElementById("userStatus").textContent = "查看模式";
      enableEditTools(false);
      initCanvas();
      showToast("已进入查看模式", "success");
    }

    function backToSelection() {
      document.getElementById("authModal").classList.remove("show");
      document.getElementById("entrySelection").classList.remove("hidden");
      document.getElementById("mainContent").style.display = "none";
      if (canvas) {
        canvas.dispose();
        canvas = null;
      }
      document.getElementById("authPassword").value = "";
    }

    // ===== 生成星空 =====
    function generateStars() {
      const starsContainer = document.getElementById("starsContainer");
      starsContainer.innerHTML = "";
      
      for (let i = 0; i < 150; i++) {
        const star = document.createElement("div");
        star.className = "star";
        star.style.left = Math.random() * 100 + "%";
        star.style.top = Math.random() * 100 + "%";
        star.style.animationDelay = Math.random() * 3 + "s";
        star.style.opacity = Math.random() * 0.7 + 0.3;
        starsContainer.appendChild(star);
      }
    }

    // ===== 初始化 Canvas =====
    function initCanvas() {
      if (canvas) return;
      
      canvas = new fabric.Canvas("canvas", {
        isDrawingMode: false,
        selection: false,
        preserveObjectStacking: true,
        backgroundColor: "transparent"
      });

      resizeCanvas();
      loadDefaultImage();
      attachCanvasEvents();
      generateStars();
    }

    function resizeCanvas() {
      const container = document.querySelector(".canvas-wrapper");
      const maxWidth = container.clientWidth - 20;
      const maxHeight = container.clientHeight - 20;
      
      canvas.setWidth(maxWidth);
      canvas.setHeight(maxHeight);
      canvas.renderAll();
    }

    function loadDefaultImage() {
      fabric.Image.fromURL(CONFIG.defaultImage, (img) => {
        loadImage(img);
      }, {
        crossOrigin: "anonymous"
      });
    }

    function loadImage(img) {
      canvas.clear();
      history = [];
      photo = img;

      let scale = Math.min(
        canvas.width / img.width,
        canvas.height / img.height
      ) * 0.95;

      img.scale(scale);
      img.set({
        left: (canvas.width - img.width * scale) / 2,
        top: (canvas.height - img.height * scale) / 2,
        selectable: false,
        evented: false
      });

      canvas.add(img);
      canvas.sendToBack(img);
      canvas.renderAll();
    }

    // ===== 认证系统 =====
    function authenticate() {
      const password = document.getElementById("authPassword").value;
      
      if (password === CONFIG.adminPassword) {
        isAdmin = true;
        document.getElementById("authModal").classList.remove("show");
        document.getElementById("userStatus").textContent = "管理员模式 ✓";
        document.getElementById("logoutBtn").style.display = "flex";
        document.getElementById("uploadLabel").classList.remove("disabled");
        enableEditTools(true);
        showToast("已进入管理员模式", "success");
      } else {
        showToast("密码错误", "error");
        document.getElementById("authPassword").value = "";
      }
    }

    function logout() {
      isAdmin = false;
      document.getElementById("userStatus").textContent = "查看模式";
      document.getElementById("logoutBtn").style.display = "none";
      document.getElementById("uploadLabel").classList.add("disabled");
      enableEditTools(false);
      clearDraw();
      showToast("已退出登录", "success");
      document.getElementById("authPassword").value = "";
      backToSelection();
    }

    function enableEditTools(enable) {
      const tools = ["penBtn", "eraserBtn", "clearBtn", "undoBtn", "saveBtn"];
      tools.forEach(id => {
        const btn = document.getElementById(id);
        btn.disabled = !enable;
      });

      document.getElementById("file").disabled = !enable;
    }

    // ===== Canvas 事件 =====
    function attachCanvasEvents() {
      // 鼠轮缩放
      canvas.on("mouse:wheel", (e) => {
        let zoom = canvas.getZoom();
        zoom = zoom + e.e.deltaY * 0.001;
        zoom = Math.max(0.5, Math.min(5, zoom));
        canvas.zoomToPoint(
          { x: e.e.offsetX, y: e.e.offsetY },
          zoom
        );
        e.e.preventDefault();
      });

      // 拖动
      let move = false, last;
      canvas.on("mouse:down", (e) => {
        if (!canvas.isDrawingMode) {
          move = true;
          last = e.e;
        }
      });

      canvas.on("mouse:move", (e) => {
        if (move) {
          canvas.relativePan(
            new fabric.Point(
              e.e.clientX - last.clientX,
              e.e.clientY - last.clientY
            )
          );
          last = e.e;
        }
      });

      canvas.on("mouse:up", () => move = false);

      // 记录绘图历史
      canvas.on("path:created", () => {
        if (isAdmin) {
          history.push(canvas.toJSON());
        }
      });
    }

    // ===== 绘图工具 =====
    function pen() {
      if (!isAdmin) {
        showToast("仅管理员可编辑", "error");
        return;
      }
      canvas.isDrawingMode = true;
      currentTool = "pen";
      updateToolButtons();
      
      let brush = new fabric.PencilBrush(canvas);
      brush.color = document.getElementById("color").value;
      brush.width = +document.getElementById("size").value;
      canvas.freeDrawingBrush = brush;
      showToast("画笔已启用", "success");
    }

    function eraser() {
      if (!isAdmin) {
        showToast("仅管理员可编辑", "error");
        return;
      }
      canvas.isDrawingMode = true;
      currentTool = "eraser";
      updateToolButtons();
      
      let brush = new fabric.EraserBrush(canvas);
      brush.width = +document.getElementById("size").value;
      canvas.freeDrawingBrush = brush;
      showToast("橡皮已启用", "success");
    }

    function updateToolButtons() {
      document.getElementById("penBtn").classList.toggle("active", currentTool === "pen");
      document.getElementById("eraserBtn").classList.toggle("active", currentTool === "eraser");
    }

    function undo() {
      if (!isAdmin) return;
      let old = history.pop();
      if (old) {
        canvas.loadFromJSON(old, () => {
          canvas.renderAll();
        });
        showToast("已撤销", "success");
      }
    }

    function clearDraw() {
      if (!isAdmin && canvas.isDrawingMode) {
        showToast("仅管理员可清除", "error");
        return;
      }
      canvas.getObjects()
        .filter(o => o !== photo)
        .forEach(o => canvas.remove(o));
      canvas.isDrawingMode = false;
      currentTool = null;
      updateToolButtons();
      history = [];
    }

    function saveImage() {
      if (!isAdmin) {
        showToast("仅管理员可下载", "error");
        return;
      }
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = "memory-book-" + new Date().toISOString().slice(0, 10) + ".png";
      link.click();
      showToast("已下载截图", "success");
    }

    // ===== 图片上传 =====
    document.getElementById("file").addEventListener("change", (e) => {
      if (!isAdmin) {
        showToast("仅管理员可上传", "error");
        return;
      }

      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        fabric.Image.fromURL(event.target.result, (img) => {
          loadImage(img);
          showToast("图片已加载", "success");
        });
      };
      reader.readAsDataURL(file);
    });

    // ===== 提示信息 =====
    function showToast(message, type = "info") {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "toast show " + type;
      
      setTimeout(() => {
        toast.classList.remove("show");
      }, 3000);
    }

    // ===== 初始化 =====
    window.addEventListener("load", () => {
      generateStars();
    });

    window.addEventListener("resize", () => {
      if (canvas && document.getElementById("mainContent").style.display !== "none") {
        resizeCanvas();
      }
    });
  </script>
</body>
</html>
